<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Credit Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-md navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Home</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNav" aria-controls="offcanvasNav" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="d-none d-md-block">
          <ul class="navbar-nav ms-auto mb-2 mb-md-0">
            <li class="nav-item"><a class="nav-link" href="sign-in.html">Sign In</a></li>
            <li class="nav-item"><a class="nav-link" href="sign-up.html">Sign Up</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNav" aria-labelledby="offcanvasNavLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasNavLabel">Menu</h5>
        <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="nav nav-pills flex-column">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="credit-simulator.html">Credit Simulator</a></li>
          <li class="nav-item"><a class="nav-link" href="guides.html">Guides</a></li>
          <li class="nav-item"><a class="nav-link" href="money-tips.html">Money Tips</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Budget</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Help</a></li>
        </ul>
      </div>
    </div>

    <main class="container py-4">
      <div class="row">
        <div class="col-12">
          <h1>Credit Simulator</h1>
          <p class="lead">Adjust the credit score and loan amount to estimate an interest rate.</p>
        </div>
      </div>
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <label for="scoreRange" class="form-label">Credit Score: <span id="scoreLabel">700</span></label>
          <input type="range" class="form-range" min="300" max="850" value="700" id="scoreRange">
        </div>
        <div class="col-12 col-md-6">
          <label for="loanAmount" class="form-label">Loan Amount</label>
          <div class="input-group">
            <span class="input-group-text">$</span>
            <input type="number" class="form-control" id="loanAmount" value="10000" min="0">
          </div>
        </div>
        <div class="col-12">
          <button id="calcBtn" class="btn btn-primary">Estimate Rate</button>
        </div>
        <div class="col-12">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Estimated Interest Rate</h5>
              <p class="card-text">Based on inputs, estimated APR: <strong id="resultRate">—</strong></p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      const scoreRange = document.getElementById('scoreRange');
      const scoreLabel = document.getElementById('scoreLabel');
      const calcBtn = document.getElementById('calcBtn');
      const resultRate = document.getElementById('resultRate');

      function estimateRate(score) {
        if (score >= 750) return 3.5;
        if (score >= 700) return 5.0;
        if (score >= 650) return 7.5;
        if (score >= 600) return 10.0;
        return 15.0;
      }

      scoreRange.addEventListener('input', () => {
        scoreLabel.textContent = scoreRange.value;
      });

      calcBtn.addEventListener('click', () => {
        const score = Number(scoreRange.value);
        const amount = Number(document.getElementById('loanAmount').value) || 0;
        const base = estimateRate(score);
        const adj = amount > 50000 ? -0.5 : amount < 5000 ? 0.5 : 0;
        resultRate.textContent = (base + adj).toFixed(2) + '%';
      });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

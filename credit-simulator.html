<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Credit Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  </head>
  <body>
    <nav class="navbar navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Flow B</a>
      </div>
    </nav>

    <main class="container py-4">
      <h2>Credit Simulator</h2>
      <p>Adjust the credit score and loan amount to estimate an interest rate.</p>

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Credit Score: <span id="scoreLabel">700</span></label>
          <input type="range" class="form-range" min="300" max="850" value="700" id="scoreRange">
        </div>

        <div class="col-md-6">
          <label class="form-label">Loan Amount</label>
          <div class="input-group">
            <span class="input-group-text">$</span>
            <input type="number" class="form-control" id="loanAmount" value="10000" min="0">
          </div>
        </div>

        <div class="col-12">
          <button id="calcBtn" class="btn btn-primary">Estimate Rate</button>
        </div>

        <div class="col-12 mt-3">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Estimated Interest Rate</h5>
              <p class="card-text">Based on inputs, estimated APR: <strong id="resultRate">—</strong></p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      const scoreRange = document.getElementById('scoreRange');
      const scoreLabel = document.getElementById('scoreLabel');
      const calcBtn = document.getElementById('calcBtn');
      const resultRate = document.getElementById('resultRate');

      function estimateRate(score) {
        if (score >= 750) return 3.5;
        if (score >= 700) return 5.0;
        if (score >= 650) return 7.5;
        if (score >= 600) return 10.0;
        return 15.0;
      }

      scoreRange.addEventListener('input', () => {
        scoreLabel.textContent = scoreRange.value;
      });

      calcBtn.addEventListener('click', () => {
        const score = Number(scoreRange.value);
        const amount = Number(document.getElementById('loanAmount').value) || 0;
        const base = estimateRate(score);
        // small adjustment depending on loan amount
        const adj = amount > 50000 ? -0.5 : (amount < 5000 ? 0.5 : 0);
        resultRate.textContent = (base + adj).toFixed(2) + '%';
      });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  </body>
</html>

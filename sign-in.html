<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#78c2ad">
    <title>Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/minty/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
  </head>
  <body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-md navbar-light navbar-mint">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
          <i class="bi bi-house-fill" aria-hidden="true"></i><span>Home</span>
        </a>
        
        <div class="collapse navbar-collapse d-md-flex" id="navbarNav">
          <ul class="navbar-nav ms-auto gap-md-2 align-items-md-center">
            <li class="nav-item"><a class="nav-link" href="sign-in.html">Sign In</a></li>
            <li class="nav-item"><a class="nav-link" href="sign-up.html">Sign Up</a></li>
          </ul>
        </div>
        <button class="nav-item btn-outline-primary gap-md-2 btn-sm ms-md-2" id="offcanvasToggle" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNav" aria-controls="offcanvasNav" aria-label="Open menu">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>
    </nav>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNav" aria-labelledby="offcanvasNavLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasNavLabel">Menu</h5>
        <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="nav nav-pills flex-column gap-1">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house-fill" aria-hidden="true"></i>Home</a></li>
          <li class="nav-item"><a class="nav-link" href="sign-in.html"><i class="bi bi-box-arrow-in-right" aria-hidden="true"></i>Sign In</a></li>
          <li class="nav-item"><a class="nav-link" href="sign-up.html"><i class="bi bi-person-plus" aria-hidden="true"></i>Sign Up</a></li>
        </ul>
      </div>
    </div>

    <main class="container mint-container py-4 flex-grow-1">
      <div id="signInAlert" class="alert alert-success alert-dismissible fade d-none" role="status">
        <i class="bi bi-check-circle me-2" aria-hidden="true"></i><span id="signInAlertMsg">Signed in successfully.</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
      <div class="row justify-content-center py-2 g-3">
        <div class="col-12 col-md-8 col-lg-6">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h1 class="h3 mb-3 d-flex align-items-center gap-2">
                <i class="bi bi-box-arrow-in-right text-primary" aria-hidden="true"></i>Sign In
              </h1>
              <form id="signInForm" action="index.html" novalidate>
                <div class="mb-3">
                  <label for="username" class="form-label">Username or Email</label>
                  <input type="text" class="form-control" id="username" name="username" autocomplete="username" required>
                  <div class="invalid-feedback" id="usernameFeedback">Enter your username or email.</div>
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required minlength="6">
                  <div class="invalid-feedback" id="passwordFeedback">Password must be at least 6 characters.</div>
                </div>
                <div class="form-check mb-3">
                  <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                  <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>
                <a href="index.html" class="btn btn-primary"><i class="bi bi-unlock me-1" aria-hidden="true"></i>Sign In</a>
              </form>
              <p class="mt-3 mb-0">Don&rsquo;t have an account? <a href="sign-up.html">Sign up</a></p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer border-top">
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var form = document.getElementById('signInForm');
        var user = document.getElementById('username');
        var pass = document.getElementById('password');
        var alertEl = document.getElementById('signInAlert');

        function clearValidity() {
          [user, pass].forEach(function (el) {
            el.classList.remove('is-invalid', 'is-valid');
          });
        }

        if (form) {
          form.addEventListener('submit', function (event) {
            event.preventDefault();
            clearValidity();
            var ok = true;
            if (!user.value.trim()) {
              user.classList.add('is-invalid');
              ok = false;
            } else {
              user.classList.add('is-valid');
            }
            if (!pass.value || pass.value.length < 6) {
              pass.classList.add('is-invalid');
              ok = false;
            } else {
              pass.classList.add('is-valid');
            }
            if (!ok) return;

            localStorage.setItem('signedIn', 'true');
            alertEl.classList.remove('d-none');
            alertEl.classList.add('show');
            var btn = form.querySelector('button[type="submit"]');
            if (btn) btn.disabled = true;
            setTimeout(function () {
              window.location.href = form.action;
            }, 650);
          });
        }
      });
    </script>
    <script src="assets/js/site.js"></script>
  </body>
</html>

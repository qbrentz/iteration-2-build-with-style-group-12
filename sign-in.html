<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <nav class="navbar navbar-expand-md navbar-light bg-light">
    
      <div class="container-fluid">
        <a class="navbar-brand" href="after-Sign-in.html">Flow B</a>
        <div class="collapse navbar-collapse d-md-flex" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="btn btn-outline-primary ms-2" href="sign-in.html">Sign In</a></li>
            <li class="nav-item"><a class="btn btn-outline-primary ms-2" href="sign-up.html">Sign Up</a></li>
          </ul>
        </div>
        <button type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNav" aria-controls="offcanvasNav">
          <span class="navbar-toggler-icon"></span>
      </button>
      </div>
      
    </nav>

    <div class="offcanvas offcanvas-start" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1" id="offcanvasNav" aria-labelledby="offcanvasNavLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasNavLabel">Menu</h5>
        <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body ">
        <ul class="nav nav-pills nav-fill flex-column">
            <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="credit-simulator.html">Credit Simulator</a></li>
            <li class="nav-item"><a class="nav-link" href="guides.html">Guides</a></li>
            <li class="nav-item"><a class="nav-link" href="money-tips.html">Money Tips</a></li>

            <li class="nav-item"><a class="nav-link" href="#">Profile</a></li>
            <li class="nav-item"><a class="nav-link" href="guides.html">Learn</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Help</a></li>
        </ul>
      </div>
    </div>
    <div class="container">
        <div class="sign-in-box">
            <h1>Sign In</h1>
            <form id="signInForm">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Enter your username or email"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                    >
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>

                <div class="forgot-password">
                    <a href="#forgot-password">Forgot password?</a>
                </div>

                <button type="submit"><a href="after-Sign-in.html">Sign In</a></button>
            </form>

            <div class="signup-link">
                Don't have an account? <a href="#sign-up">Sign up</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

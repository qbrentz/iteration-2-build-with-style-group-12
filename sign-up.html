<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-md navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Home</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNav" aria-controls="offcanvasNav" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="d-none d-md-block">
          <ul class="navbar-nav ms-auto mb-2 mb-md-0">
            <li class="nav-item"><a class="nav-link" href="sign-in.html">Sign In</a></li>
            <li class="nav-item"><a class="nav-link" href="sign-up.html">Sign Up</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNav" aria-labelledby="offcanvasNavLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasNavLabel">Menu</h5>
        <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="nav nav-pills flex-column">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="credit-simulator.html">Credit Simulator</a></li>
          <li class="nav-item"><a class="nav-link" href="guides.html">Guides</a></li>
          <li class="nav-item"><a class="nav-link" href="money-tips.html">Money Tips</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Budget</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Help</a></li>
        </ul>
      </div>
    </div>

    <main class="container py-4">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6">
          <div class="card">
            <div class="card-body">
              <h1 class="h3 mb-4">Sign Up</h1>
              <form id="signUpForm" action="learning-page.html" novalidate>
                <div class="form-floating mb-3">
                  <input type="text" class="form-control" id="fullName" placeholder="Full Name" required>
                  <label for="fullName">Full Name</label>
                  <div class="valid-feedback">Full name looks good.</div>
                </div>
                <div class="form-floating mb-3">
                  <input type="email" class="form-control is-valid" id="email" placeholder="Email" required>
                  <label for="email">Email</label>
                  <div class="valid-feedback">Email looks good.</div>
                </div>
                <div class="form-floating mb-3">
                  <input type="password" class="form-control" id="password" placeholder="Password" required>
                  <label for="password">Password</label>
                  <div class="invalid-feedback">Password is required.</div>
                </div>
                <div class="form-floating mb-3">
                  <input type="password" class="form-control is-invalid" id="confirmPassword" placeholder="Confirm Password" required>
                  <label for="confirmPassword">Confirm Password</label>
                  <div class="invalid-feedback">Please confirm your password.</div>
                </div>
                <div class="form-floating mb-3">
                  <textarea class="form-control" placeholder="Goals (Optional)" id="goals" rows="3"></textarea>
                  <label for="goals">Goals (Optional)</label>
                </div>
                <button type="submit" class="btn btn-primary">Create Account</button>
              </form>
              <p class="mt-3 mb-0">Already have an account? <a href="sign-in.html">Sign in</a></p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var form = document.getElementById('signUpForm');
        if (form) {
          form.addEventListener('submit', function (event) {
            event.preventDefault();
            var inputs = form.querySelectorAll('input[type="text"], input[type="email"], input[type="password"], textarea');
            var hasValue = Array.prototype.some.call(inputs, function (input) {
              return input.value.trim() !== '';
            });
            if (!hasValue) {
              return;
            }
            localStorage.setItem('signedIn', 'true');
            var button = form.querySelector('button[type="submit"]');
            if (button) {
              button.disabled = true;
            }
            window.location.href = form.action;
          });
        }
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
